---
layout: default
title: 搜索
category: search
language: cn
---
<section class="inner">
  <h1>全文搜索</h1>
  <div class="search-box">
    <input type="text" id="search-input" placeholder="输入搜索关键词..." autofocus>
    <button id="search-button"><i class="fa fa-search"></i></button>
  </div>
  <div id="search-results"></div>
</section>

<style>
.search-box {
  margin: 20px 0;
  display: flex;
  gap: 10px;
}
.search-box input {
  flex: 1;
  padding: 10px 15px;
  font-size: 16px;
  border: 1px solid #ddd;
  border-radius: 4px;
  outline: none;
}
.search-box input:focus {
  border-color: #666;
}
.search-box button {
  padding: 10px 20px;
  background: #333;
  color: white;
  border: none;
  border-radius: 4px;
  cursor: pointer;
}
.search-box button:hover {
  background: #555;
}
.search-result {
  margin: 20px 0;
  padding: 15px;
  border-bottom: 1px solid #eee;
}
.search-result h3 {
  margin: 0 0 10px 0;
}
.search-result h3 a {
  color: #333;
  text-decoration: none;
}
.search-result h3 a:hover {
  text-decoration: underline;
}
.search-result .date {
  color: #999;
  font-size: 14px;
}
.search-result .snippet {
  color: #666;
  margin-top: 10px;
  line-height: 1.6;
}
.no-results {
  text-align: center;
  color: #999;
  padding: 40px;
}
</style>

<script src="https://unpkg.com/lunr/lunr.min.js"></script>
<script>
let idx = null;
let documents = [];

function initSearch() {
  fetch('/search.json')
    .then(response => response.json())
    .then(data => {
      documents = data;
      idx = lunr(function() {
        this.ref('url');
        this.field('title', { boost: 10 });
        this.field('content', { boost: 1 });
        this.field('tags', { boost: 5 });
        
        documents.forEach(doc => {
          this.add(doc);
        });
      });
    })
    .catch(error => console.error('Error loading search index:', error));
}

function performSearch(query) {
  if (!idx || !query.trim()) {
    return [];
  }
  
  const results = idx.search(query);
  return results.map(result => {
    const doc = documents.find(d => d.url === result.ref);
    return {
      ...doc,
      score: result.score
    };
  });
}

function highlightText(text, query) {
  if (!query) return text;
  const regex = new RegExp(`(${query.split(' ').filter(q => q).join('|')})`, 'gi');
  return text.replace(regex, '<mark>$1</mark>');
}

function getSnippet(content, query) {
  const queryWords = query.toLowerCase().split(' ').filter(q => q);
  const lowerContent = content.toLowerCase();
  let bestPos = -1;
  let bestScore = 0;
  
  for (const word of queryWords) {
    const pos = lowerContent.indexOf(word);
    if (pos !== -1) {
      bestPos = pos;
      break;
    }
  }
  
  if (bestPos === -1) {
    return content.substring(0, 200) + '...';
  }
  
  const start = Math.max(0, bestPos - 80);
  const end = Math.min(content.length, bestPos + 120);
  let snippet = content.substring(start, end);
  
  if (start > 0) snippet = '...' + snippet;
  if (end < content.length) snippet += '...';
  
  return snippet;
}

function displayResults(results, query) {
  const container = document.getElementById('search-results');
  
  if (results.length === 0) {
    container.innerHTML = '<div class="no-results">没有找到相关结果</div>';
    return;
  }
  
  container.innerHTML = results.map(result => `
    <div class="search-result">
      <h3><a href="${result.url}">${highlightText(result.title, query)}</a></h3>
      ${result.date ? `<div class="date">${result.date}</div>` : ''}
      <div class="snippet">${highlightText(getSnippet(result.content, query), query)}</div>
    </div>
  `).join('');
}

document.addEventListener('DOMContentLoaded', () => {
  initSearch();
  
  const searchInput = document.getElementById('search-input');
  const searchButton = document.getElementById('search-button');
  
  const doSearch = () => {
    const query = searchInput.value;
    const results = performSearch(query);
    displayResults(results, query);
  };
  
  searchButton.addEventListener('click', doSearch);
  searchInput.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') {
      doSearch();
    }
  });
  
  searchInput.addEventListener('input', () => {
    const query = searchInput.value;
    if (query.length >= 2) {
      const results = performSearch(query);
      displayResults(results, query);
    } else {
      document.getElementById('search-results').innerHTML = '';
    }
  });
});
</script>
