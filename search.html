---
layout: default
title: 搜索
category: search
language: cn
---
<section class="inner">
  <h1>全文搜索</h1>
  <div class="search-box">
    <input type="text" id="search-input" placeholder="输入搜索关键词..." autofocus>
    <button id="search-button"><i class="fa fa-search"></i></button>
  </div>
  <div id="search-results"></div>
</section>

<style>
.search-box {
  margin: 20px 0;
  display: flex;
  gap: 10px;
}
.search-box input {
  flex: 1;
  padding: 10px 15px;
  font-size: 16px;
  border: 1px solid #ddd;
  border-radius: 4px;
  outline: none;
}
.search-box input:focus {
  border-color: #666;
}
.search-box button {
  padding: 10px 20px;
  background: #333;
  color: white;
  border: none;
  border-radius: 4px;
  cursor: pointer;
}
.search-box button:hover {
  background: #555;
}
.search-result {
  margin: 20px 0;
  padding: 15px;
  border-bottom: 1px solid #eee;
}
.search-result h3 {
  margin: 0 0 10px 0;
}
.search-result h3 a {
  color: #333;
  text-decoration: none;
}
.search-result h3 a:hover {
  text-decoration: underline;
}
.search-result .date {
  color: #999;
  font-size: 14px;
}
.search-result .snippet {
  color: #666;
  margin-top: 10px;
  line-height: 1.6;
}
.no-results {
  text-align: center;
  color: #999;
  padding: 40px;
}
</style>

<script>
let documents = [];

function isChinese(char) {
  return /[\u4e00-\u9fa5]/.test(char);
}

function tokenize(text) {
  const tokens = [];
  let currentToken = '';
  
  for (let i = 0; i < text.length; i++) {
    const char = text[i];
    if (isChinese(char)) {
      if (currentToken) {
        tokens.push(currentToken.toLowerCase());
        currentToken = '';
      }
      tokens.push(char);
      if (i < text.length - 1 && isChinese(text[i + 1])) {
        tokens.push(char + text[i + 1]);
      }
    } else if (/\s/.test(char)) {
      if (currentToken) {
        tokens.push(currentToken.toLowerCase());
        currentToken = '';
      }
    } else {
      currentToken += char;
    }
  }
  if (currentToken) {
    tokens.push(currentToken.toLowerCase());
  }
  return tokens;
}

function buildIndex(docs) {
  const index = {};
  docs.forEach((doc, docIndex) => {
    const fields = [
      { text: doc.title, boost: 10 },
      { text: doc.content, boost: 1 },
      { text: doc.tags || '', boost: 5 }
    ];
    
    fields.forEach(field => {
      const tokens = tokenize(field.text);
      tokens.forEach(token => {
        if (!index[token]) {
          index[token] = {};
        }
        if (!index[token][docIndex]) {
          index[token][docIndex] = 0;
        }
        index[token][docIndex] += field.boost;
      });
    });
  });
  return index;
}

let searchIndex = null;

function initSearch() {
  fetch('/search.json')
    .then(response => response.json())
    .then(data => {
      documents = data;
      searchIndex = buildIndex(documents);
    })
    .catch(error => console.error('Error loading search index:', error));
}

function performSearch(query) {
  if (!searchIndex || !query.trim()) {
    return [];
  }
  
  const queryTokens = tokenize(query);
  const scores = {};
  
  queryTokens.forEach(token => {
    if (searchIndex[token]) {
      Object.keys(searchIndex[token]).forEach(docIndex => {
        if (!scores[docIndex]) {
          scores[docIndex] = 0;
        }
        scores[docIndex] += searchIndex[token][docIndex];
      });
    }
  });
  
  const sortedDocIndices = Object.keys(scores)
    .sort((a, b) => scores[b] - scores[a]);
  
  return sortedDocIndices.map(docIndex => ({
    ...documents[docIndex],
    score: scores[docIndex]
  }));
}

function highlightText(text, query) {
  if (!query) return text;
  const queryLower = query.toLowerCase();
  
  let keywords = [];
  const englishWords = queryLower.match(/[a-zA-Z]+/g) || [];
  keywords = keywords.concat(englishWords);
  
  for (let i = 0; i < query.length; i++) {
    if (isChinese(query[i])) {
      keywords.push(query[i]);
      if (i < query.length - 1 && isChinese(query[i + 1])) {
        keywords.push(query.substring(i, i + 2));
      }
    }
  }
  
  keywords = [...new Set(keywords)].sort((a, b) => b.length - a.length);
  
  let result = text;
  keywords.forEach(keyword => {
    if (!keyword) return;
    const regex = new RegExp(`(${keyword.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
    result = result.replace(regex, '<mark>$1</mark>');
  });
  
  return result;
}

function getSnippet(content, query) {
  const lowerContent = content.toLowerCase();
  let bestPos = -1;
  
  for (let i = 0; i < query.length; i++) {
    const substr = query.substring(Math.max(0, i - 1), i + 2);
    const pos = lowerContent.indexOf(substr.toLowerCase());
    if (pos !== -1) {
      bestPos = pos;
      break;
    }
  }
  
  if (bestPos === -1) {
    const englishWords = query.match(/[a-zA-Z]+/g) || [];
    for (const word of englishWords) {
      const pos = lowerContent.indexOf(word.toLowerCase());
      if (pos !== -1) {
        bestPos = pos;
        break;
      }
    }
  }
  
  if (bestPos === -1) {
    return content.substring(0, 200) + '...';
  }
  
  const start = Math.max(0, bestPos - 80);
  const end = Math.min(content.length, bestPos + 120);
  let snippet = content.substring(start, end);
  
  if (start > 0) snippet = '...' + snippet;
  if (end < content.length) snippet += '...';
  
  return snippet;
}

function displayResults(results, query) {
  const container = document.getElementById('search-results');
  
  if (results.length === 0) {
    container.innerHTML = '<div class="no-results">没有找到相关结果</div>';
    return;
  }
  
  container.innerHTML = results.map(result => `
    <div class="search-result">
      <h3><a href="${result.url}">${highlightText(result.title, query)}</a></h3>
      ${result.date ? `<div class="date">${result.date}</div>` : ''}
      <div class="snippet">${highlightText(getSnippet(result.content, query), query)}</div>
    </div>
  `).join('');
}

document.addEventListener('DOMContentLoaded', () => {
  initSearch();
  
  const searchInput = document.getElementById('search-input');
  const searchButton = document.getElementById('search-button');
  
  const doSearch = () => {
    const query = searchInput.value;
    const results = performSearch(query);
    displayResults(results, query);
  };
  
  searchButton.addEventListener('click', doSearch);
  searchInput.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') {
      doSearch();
    }
  });
  
  searchInput.addEventListener('input', () => {
    const query = searchInput.value;
    if (query.length >= 1) {
      const results = performSearch(query);
      displayResults(results, query);
    } else {
      document.getElementById('search-results').innerHTML = '';
    }
  });
});
</script>
